services:
  - type: web
    name: jac-hub
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile=false && pnpm run typecheck:libs && BASE_PATH=/ PORT=3000 NODE_ENV=production pnpm --filter @workspace/jac-hub run build && NODE_ENV=production pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: jac-hub-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:gael@jac.dev

databases:
  - name: jac-hub-db
    plan: free
